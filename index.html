<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eazy — Tranquilidade Financeira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script>
    (function() {
      const uid = Object.keys(localStorage).find(k => k.startsWith('prefs_'))
      if (uid) {
        try {
          const prefs = JSON.parse(localStorage.getItem(uid))
          if (prefs && prefs.theme) document.documentElement.setAttribute('data-theme', prefs.theme)
        } catch(e) {}
      }
    })()
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
